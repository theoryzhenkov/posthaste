[workspace]
members = ["jmap-core", "mail-engine", "uniffi-bridge"]
resolver = "2"

[workspace.dependencies]
uniffi = { version = "0.29", features = ["cli"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
